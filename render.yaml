services:
  - type: web
    name: scmhrd-placement-os
    runtime: node
    plan: free
    region: oregon
    buildCommand: |
      cd frontend
      npm ci
      npm run build
      cd ../backend
      npm ci
      npm rebuild better-sqlite3
      rm -rf static
      cp -r ../frontend/dist static
    startCommand: |
      cd backend
      node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      # Writable path on cloud hosts (ephemeral on free tier)
      - key: DB_PATH
        value: /tmp/placement.db
      # Auto-generated on first deploy (do not commit secrets to git)
      - key: JWT_SECRET
        generateValue: true
