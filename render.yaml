services:
  - type: web
    name: scmhrd-placement-os
    runtime: node
    plan: free
    region: oregon
    buildCommand: |
      cd frontend
      npm ci
      npm run build
      cd ../backend
      npm ci
    startCommand: |
      cd backend
      node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      # Auto-generated on first deploy (do not commit secrets to git)
      - key: JWT_SECRET
        generateValue: true
