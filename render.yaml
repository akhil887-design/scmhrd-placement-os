services:
  - type: web
    name: scmhrd-placement-os
    runtime: node
    plan: free
    region: oregon
    # One shell chain so `cd` definitely applies (some runners reset cwd per line).
    buildCommand: cd frontend && npm ci && npm run build && cd ../backend && npm ci && rm -rf static && mkdir -p static && cp -r ../frontend/dist/. static/
    startCommand: |
      cd backend
      node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      # Writable path on cloud hosts (ephemeral on free tier)
      - key: DB_PATH
        value: /tmp/placement.db
      # Auto-generated on first deploy (do not commit secrets to git)
      - key: JWT_SECRET
        generateValue: true
